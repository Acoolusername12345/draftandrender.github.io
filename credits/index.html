    <div id="lightbox" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4 cursor-pointer" onclick="closeLightbox()">
        <img id="lightbox-img" src="" class="max-w-full max-h-[90vh] rounded-xl shadow-2xl border border-white/10 scale-90">
    </div>

    <script>
        // Page Entrance Animations
        window.onload = () => {
            const tl = gsap.timeline();
            tl.from("#hero-title", {
                y: 100,
                opacity: 0,
                duration: 1.2,
                ease: "power4.out"
            })
            .from("#hero-sub", {
                y: 30,
                opacity: 0,
                duration: 1,
                ease: "power3.out"
            }, "-=0.8")
            .from("#hero-btn", {
                scale: 0.8,
                opacity: 0,
                duration: 0.5
            }, "-=0.5");
        };

        // Lightbox Logic
        function openLightbox(element) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = element.src;
            lightbox.classList.remove('hidden');
            gsap.to("#lightbox-img", {
                scale: 1,
                duration: 0.4,
                ease: "back.out(1.7)"
            });
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.add('hidden');
            document.getElementById('lightbox-img').style.transform = "scale(0.9)";
        }

        const form = document.getElementById("contact-form");
        const status = document.getElementById("form-status");

        form.addEventListener("submit", async function(event) {
            event.preventDefault();

            const data = new FormData(event.target);

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    status.innerHTML = "<b>SUCCESS</b>: Inquiry Sent!";
                    status.style.color = "#4ade80"; // Green
                    form.reset();
                } else {
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                            console.log = data["errors"].map(error => error["message"]).join(", ");
                        } else {
                            status.innerHTML = "Oops! There was a problem.";
                        }
                        status.style.color = "#f87171"; // Red
                    })
                }
            }).catch(error => {
                status.innerHTML = "Oops! There was a problem connecting.";
                status.style.color = "#f87171";
            });
        });
    </script>
